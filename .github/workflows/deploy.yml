name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master, feature/wasm-github-pages ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Configure git
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    
    - name: Install wasm-bindgen-cli
      run: cargo install wasm-bindgen-cli
    
    - name: Install wasm-opt
      run: |
        curl -LO https://github.com/WebAssembly/binaryen/releases/download/version_118/binaryen-version_118-x86_64-linux.tar.gz
        tar -xzf binaryen-version_118-x86_64-linux.tar.gz
        export PATH="$PWD/binaryen-version_118:$PATH"
        echo "PATH=$PATH" >> $GITHUB_ENV
    
    - name: Cargo Check
      run: |
        source "$HOME/.cargo/env"
        cargo check --target wasm32-unknown-unknown
    
    - name: Build WASM
      run: |
        source "$HOME/.cargo/env"
        cargo build --profile wasm-release --target wasm32-unknown-unknown
    
    - name: Optimize WASM
      run: |
        wasm-opt -Oz --output target/wasm32-unknown-unknown/wasm-release/guitar-notes.wasm target/wasm32-unknown-unknown/wasm-release/guitar-notes.wasm
    
    - name: Bindgen
      run: |
        wasm-bindgen --out-name guitar_notes --out-dir www --target web target/wasm32-unknown-unknown/wasm-release/guitar-notes.wasm
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./www
